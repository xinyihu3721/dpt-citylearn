seed: 0

data:
  seeds: [73055, 90000, 12345]
  h_max: 256
  # Dataset.__getitem__ ignores its index and draws fresh random (context, query) pairs each call
  # (see dpt_dataset.py), so epoch_size just needs to comfortably exceed batch_size * total_steps.
  epoch_size: 2000000

model:
  d_model: 256
  n_layers: 4
  n_heads: 8
  dropout: 0.1
  n_bins: 21

train:
  batch_size: 64
  lr: 3.0e-4
  warmup_steps: 200
  total_steps: 3000
  grad_clip: 1.0
  checkpoint_every: 250
  log_every: 20
  checkpoint_dir: checkpoints  # relative to repo root; run this script with the repo root as cwd
  device: cuda
